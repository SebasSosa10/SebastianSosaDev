<footer class="border-t border-slate-800 bg-slate-950">
  <div
    class="mx-auto flex max-w-5xl flex-col gap-8 px-4 py-12 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8"
  >
    <div class="space-y-2">
      <p class="text-sm font-semibold text-white">{{ site.name }}</p>
      <p class="max-w-sm text-sm text-slate-500">
        Portafolio personal — reemplaza enlaces y textos en
        <code class="rounded bg-slate-800 px-1 py-0.5 text-xs text-brand-400"
          >shared/data/site.ts</code
        >.
      </p>
    </div>

    <div class="flex flex-wrap items-center gap-6">
      @for (item of site.nav; track item.sectionId) {
        <a
          [attr.href]="'#' + item.sectionId"
          (click)="onNavClick($event, item.sectionId)"
          class="text-sm text-slate-400 transition hover:text-brand-400"
        >
          {{ item.label }}
        </a>
      }
    </div>

    <div class="flex items-center gap-4">
      @for (link of site.social; track link.label) {
        <a
          [href]="link.href"
          target="_blank"
          rel="noopener noreferrer"
          class="text-sm font-medium text-slate-400 transition hover:text-white"
        >
          {{ link.label }}
        </a>
      }
    </div>
  </div>

  <div class="border-t border-slate-800/80">
    <p
      class="mx-auto max-w-5xl px-4 py-6 text-center text-xs text-slate-600 sm:px-6 lg:px-8"
    >
      © {{ year }} {{ site.name }}. Hecho con Angular y Tailwind.
    </p>
  </div>
</footer>
