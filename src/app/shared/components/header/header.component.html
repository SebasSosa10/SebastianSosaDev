<header
  class="sticky top-0 z-50 border-b border-slate-800/80 bg-slate-950/85 backdrop-blur-md"
>
  <div
    class="mx-auto flex max-w-5xl items-center justify-between gap-4 px-4 py-3 sm:px-6 lg:px-8"
  >
    <a
      href="/"
      class="group flex flex-col leading-tight"
      (click)="onBrandClick($event)"
    >
      <span
        class="text-sm font-semibold tracking-tight text-white transition group-hover:text-brand-400"
        >{{ site.name }}</span
      >
      <span class="text-xs text-slate-500">{{ site.title }}</span>
    </a>

    <nav
      class="hidden items-center gap-1 md:flex"
      aria-label="Principal"
    >
      @for (item of site.nav; track item.sectionId) {
        <a
          [attr.href]="'#' + item.sectionId"
          (click)="onNavClick($event, item.sectionId)"
          class="rounded-lg px-3 py-2 text-sm font-medium text-slate-400 transition hover:bg-slate-800/60 hover:text-slate-100"
        >
          {{ item.label }}
        </a>
      }
    </nav>

    <button
      type="button"
      class="inline-flex items-center justify-center rounded-lg border border-slate-700 p-2 text-slate-300 transition hover:border-slate-600 hover:bg-slate-800/50 hover:text-white md:hidden"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="mobile-nav"
      aria-label="Abrir menú"
    >
      @if (menuOpen()) {
        <svg
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      } @else {
        <svg
          class="h-5 w-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      }
    </button>
  </div>

  @if (menuOpen()) {
    <nav
      id="mobile-nav"
      class="border-t border-slate-800 bg-slate-950 px-4 py-4 md:hidden"
      aria-label="Móvil"
    >
      <div class="flex flex-col gap-1">
        @for (item of site.nav; track item.sectionId) {
          <a
            [attr.href]="'#' + item.sectionId"
            (click)="onNavClick($event, item.sectionId)"
            class="rounded-lg px-3 py-2.5 text-sm font-medium text-slate-300 hover:bg-slate-800/80"
          >
            {{ item.label }}
          </a>
        }
      </div>
    </nav>
  }
</header>
