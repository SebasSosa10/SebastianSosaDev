<!doctype html>
<html lang="es" class="dark">
<head>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('portfolio-theme');
        var d = document.documentElement;
        if (t === 'light') d.classList.remove('dark');
        else d.classList.add('dark');
        var l = localStorage.getItem('portfolio-locale');
        if (l === 'en') d.lang = 'en';
        else d.lang = 'es';
      } catch (e) {}
    })();
  </script>
  <meta charset="utf-8">
  <title>Sebastian Sosa — Desarrollador de software</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Portafolio profesional — ingeniería de software, proyectos y contacto.">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
</head>

</body>
</html>
